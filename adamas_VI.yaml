%YAML:1.0

#--------------------------------------------------------------------------------------------
# ORB-SLAM3 Stereo-Inertial configuration for ZED2i (HD 1280x720)
#--------------------------------------------------------------------------------------------

File.version: "1.0"

#--------------------------------------------------------------------------------------------
# Camera Parameters
#--------------------------------------------------------------------------------------------

Camera.type: "PinHole"

# Left camera
Camera1.fx: 534.095
Camera1.fy: 534.005
Camera1.cx: 647.385
Camera1.cy: 347.164

Camera1.k1: -0.0638313
Camera1.k2: 0.0360577
Camera1.p1: 0.000133141
Camera1.p2: -7.80476e-05
Camera1.k3: -0.0134512

# Right camera
Camera2.fx: 533.140
Camera2.fy: 533.125
Camera2.cx: 639.725
Camera2.cy: 358.768

Camera2.k1: -0.0709067
Camera2.k2: 0.0499454
Camera2.p1: -0.000237675
Camera2.p2: -0.000586798
Camera2.k3: -0.0195613

#--------------------------------------------------------------------------------------------
# Stereo Extrinsics
#--------------------------------------------------------------------------------------------

Stereo.T_c1_c2: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [0.99999840, -0.00017082,  0.00178070,  0.119848,
         0.00017082,  0.99999288, -0.00376933,  0.000020174,
        -0.00178070,  0.00376933,  0.99999131,  0.000483349,
         0.0,          0.0,         0.0,         1.0]

#--------------------------------------------------------------------------------------------
# Image Parameters
#--------------------------------------------------------------------------------------------

Camera.width: 1280
Camera.height: 720

Camera.fps: 30

Camera.RGB: 1

Stereo.ThDepth: 40.0

#--------------------------------------------------------------------------------------------
# IMU -> Left Camera Transform
#--------------------------------------------------------------------------------------------

IMU.T_b_c1: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [0.99998778,  0.00161116, -0.00466752, -0.0230504,
        -0.00162812,  0.99999207, -0.00363301,  0.0002478,
         0.00466163,  0.00364056,  0.99998254,  0.0018936,
         0.0,         0.0,         0.0,         1.0]

#--------------------------------------------------------------------------------------------
# IMU Parameters
#--------------------------------------------------------------------------------------------

IMU.NoiseGyro: 0.004992
IMU.NoiseAcc: 0.00044

IMU.GyroWalk: 0.0424
IMU.AccWalk: 0.0202

IMU.Frequency: 400.0

#--------------------------------------------------------------------------------------------
# ORB Extractor Parameters
#--------------------------------------------------------------------------------------------

ORBextractor.nFeatures: 2000

ORBextractor.scaleFactor: 1.2

ORBextractor.nLevels: 8

ORBextractor.iniThFAST: 20

ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------

Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -3.5
Viewer.ViewpointF: 500.0
